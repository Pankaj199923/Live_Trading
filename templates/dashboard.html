<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TERM // Live Excel Feed</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #05060A;
    --panel: #0A0D11;
    --panel-alt: #0D1117;
    --border: #1B2128;
    --border-bright: #2A343D;
    --text: #C9D3D6;
    --text-bright: #EDF3F5;
    --muted: #4E5A63;
    --amber: #FF9F1C;
    --amber-dim: #5A3E12;
    --up: #00E08F;
    --up-dim: #0A3D2C;
    --down: #FF4757;
    --down-dim: #4A1319;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html { scrollbar-color: var(--border) var(--bg); }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'IBM Plex Mono', monospace;
    min-height: 100vh;
    background-image:
      linear-gradient(rgba(255,255,255,0.012) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.012) 1px, transparent 1px);
    background-size: 24px 24px;
  }

  /* ---------- top scanline flash ---------- */
  .scanline {
    height: 2px;
    width: 100%;
    background: linear-gradient(90deg, transparent, var(--amber), transparent);
    opacity: 0;
    position: sticky;
    top: 0;
    z-index: 50;
  }
  .scanline.flash { animation: scan 0.9s ease-out; }
  @keyframes scan {
    0% { opacity: 1; transform: translateX(-100%); }
    60% { opacity: 1; }
    100% { opacity: 0; transform: translateX(100%); }
  }

  /* ---------- topbar ---------- */
  .topbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 24px;
    border-bottom: 1px solid var(--border);
    background: var(--panel);
    flex-wrap: wrap;
    gap: 12px;
    position: relative;
  }
  .topbar::before, .topbar::after {
    content: '';
    position: absolute;
    width: 10px; height: 10px;
    border-color: var(--amber-dim);
    opacity: 0.7;
  }
  .brand { display: flex; align-items: center; gap: 10px; }
  .brand-mark {
    width: 9px; height: 9px;
    background: var(--amber);
    box-shadow: 0 0 8px rgba(255,159,28,0.7);
    flex-shrink: 0;
  }
  .brand-title {
    font-weight: 700;
    font-size: 13px;
    letter-spacing: 0.12em;
    color: var(--text-bright);
    text-transform: uppercase;
  }
  .brand-sub {
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 0.04em;
  }
  .status {
    display: flex;
    align-items: center;
    gap: 20px;
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 0.02em;
  }
  .status-item { display: flex; align-items: center; gap: 7px; }
  .status-label { color: var(--muted); text-transform: uppercase; font-size: 10px; letter-spacing: 0.08em; }
  .status-val { color: var(--text-bright); }
  .dot {
    width: 7px; height: 7px;
    background: var(--muted);
    position: relative;
  }
  .dot.live {
    background: var(--up);
    box-shadow: 0 0 0 0 rgba(0, 224, 143, 0.6);
    animation: pulse 1.8s infinite;
  }
  @keyframes pulse {
    0% { box-shadow: 0 0 0 0 rgba(0, 224, 143, 0.55); }
    70% { box-shadow: 0 0 0 7px rgba(0, 224, 143, 0); }
    100% { box-shadow: 0 0 0 0 rgba(0, 224, 143, 0); }
  }
  .cursor-blink {
    display: inline-block;
    width: 6px; height: 12px;
    background: var(--amber);
    animation: blink 1s steps(1) infinite;
    vertical-align: middle;
  }
  @keyframes blink { 0%, 49% { opacity: 1; } 50%, 100% { opacity: 0; } }

  /* ---------- layout ---------- */
  .container { padding: 20px 24px 48px; max-width: 100%; }
  .meta-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 14px;
    flex-wrap: wrap;
    gap: 10px;
  }
  .sheet-name-wrap { display: flex; align-items: baseline; gap: 10px; }
  .sheet-tag {
    font-size: 10px;
    color: var(--bg);
    background: var(--muted);
    padding: 2px 6px;
    letter-spacing: 0.08em;
    font-weight: 600;
  }
  .sheet-name {
    font-size: 17px;
    font-weight: 600;
    color: var(--text-bright);
    letter-spacing: 0.01em;
  }
  .row-count, .col-count {
    color: var(--muted);
    font-size: 11.5px;
    letter-spacing: 0.02em;
  }
  .row-count .num, .col-count .num { color: var(--text-bright); }

  .toolbar { display: flex; align-items: center; gap: 10px; }
  .search-box {
    background: var(--bg);
    border: 1px solid var(--border);
    padding: 7px 10px 7px 28px;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 12px;
    color: var(--text);
    outline: none;
    width: 220px;
    transition: border-color 0.15s;
    position: relative;
  }
  .search-box:focus { border-color: var(--amber-dim); }
  .search-box::placeholder { color: var(--muted); }
  .search-wrap { position: relative; display: flex; align-items: center; }
  .search-wrap::before {
    content: '/';
    position: absolute;
    left: 10px;
    color: var(--muted);
    font-size: 12px;
    pointer-events: none;
  }

  /* ---------- table panel ---------- */
  .table-wrap {
    border: 1px solid var(--border);
    overflow-x: hidden;
    overflow-y: auto;
    background: var(--panel);
    max-width: 100%;
    max-height: 76vh;
    position: relative;
  }
  .table-wrap::-webkit-scrollbar { width: 10px; }
  .table-wrap::-webkit-scrollbar-track { background: var(--panel); }
  .table-wrap::-webkit-scrollbar-thumb { background: var(--border-bright); }
  .table-wrap::-webkit-scrollbar-thumb:hover { background: var(--muted); }

  table {
    width: 100%;
    table-layout: fixed;
    border-collapse: separate;
    border-spacing: 0;
    font-size: 12.5px;
  }
  thead th {
    text-align: left;
    padding: 10px 12px;
    background: var(--panel-alt);
    color: var(--muted);
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    font-size: 10.5px;
    border-bottom: 1px solid var(--border-bright);
    border-right: 1px solid var(--border);
    position: sticky;
    top: 0;
    z-index: 2;
    overflow-wrap: break-word;
  }
  thead th.col-num { text-align: right; }
  thead th.idx-col { width: 44px; text-align: center; }
  thead th:last-child { border-right: none; }

  tbody td {
    padding: 8px 12px;
    border-bottom: 1px solid var(--border);
    border-right: 1px solid var(--border);
    color: var(--text);
    white-space: normal;
    overflow-wrap: break-word;
    word-break: break-word;
    vertical-align: top;
  }
  tbody td:last-child { border-right: none; }
  tbody td.col-num {
    text-align: right;
    font-variant-numeric: tabular-nums;
    color: var(--text);
  }
  tbody td.idx-col {
    background: var(--panel-alt);
    color: var(--muted);
    text-align: center;
    font-size: 10.5px;
    border-right: 1px solid var(--border-bright);
  }
  tbody tr:last-child td { border-bottom: none; }
  tbody tr:nth-child(even) td { background: rgba(255,255,255,0.012); }
  tbody tr:nth-child(even) td.idx-col { background: #0C1015; }
  tbody tr:hover td { background: #12171C; }
  tbody tr:hover td.idx-col { background: #151B21; }

  tbody tr.updated td { animation: rowFlash 1.2s ease-out; }
  @keyframes rowFlash {
    0% { background: rgba(255, 159, 28, 0.14); }
    100% { background: transparent; }
  }

  td.tick-up { color: var(--up) !important; animation: flashUp 1.6s ease-out; }
  td.tick-down { color: var(--down) !important; animation: flashDown 1.6s ease-out; }
  @keyframes flashUp {
    0% { background: rgba(0, 224, 143, 0.28); }
    100% { background: transparent; }
  }
  @keyframes flashDown {
    0% { background: rgba(255, 71, 87, 0.28); }
    100% { background: transparent; }
  }
  .arrow-up::before { content: '▲ '; font-size: 9px; }
  .arrow-down::before { content: '▼ '; font-size: 9px; }
  td.tick-changed { animation: cellFlash 1.4s ease-out; }
  @keyframes cellFlash {
    0% { background: rgba(255, 159, 28, 0.24); }
    100% { background: transparent; }
  }

  .empty-state, .no-match {
    padding: 60px 20px;
    text-align: center;
    color: var(--muted);
  }
  .empty-state .big { font-size: 14px; color: var(--text-bright); margin-bottom: 6px; }
  .empty-state .small, .no-match { font-size: 12px; }

  ::selection { background: var(--amber-dim); color: var(--text-bright); }
</style>
</head>
<body>

<div class="scanline" id="scanline"></div>

<div class="topbar">
  <div class="brand">
    <div class="brand-mark"></div>
    <div class="brand-title">TERM // Excel Feed</div>
    <div class="brand-sub">real-time sheet sync</div>
  </div>
  <div class="status">
    <div class="status-item"><span class="dot" id="connDot"></span><span id="connText" class="status-val">connecting…</span></div>
    <div class="status-item"><span class="status-label">upd</span><span class="status-val" id="updatedAt">—</span></div>
    <div class="status-item"><span class="status-label">age</span><span class="status-val" id="ageAt">—</span></div>
    <div class="status-item"><span class="status-label">clock</span><span class="status-val" id="clockAt">—</span><span class="cursor-blink"></span></div>
  </div>
</div>

<div class="container">
  <div class="meta-row">
    <div class="sheet-name-wrap">
      <span class="sheet-tag">SHEET</span>
      <div class="sheet-name" id="sheetName">Waiting for data…</div>
    </div>
    <div class="toolbar">
      <div class="search-wrap">
        <input type="text" class="search-box" id="searchBox" placeholder="search rows…" oninput="applyFilter()" disabled>
      </div>
      <span class="col-count" id="colCount"></span>
      <span class="row-count" id="rowCount"></span>
    </div>
  </div>

  <div class="table-wrap">
    <div id="tableContainer">
      <div class="empty-state">
        <div class="big">Abhi tak koi data nahi aaya</div>
        <div class="small">Apna excel_watcher.py chalu karo taaki live data yahan dikhe</div>
      </div>
    </div>
  </div>
</div>

<script src="/static/socket.io.min.js"></script>
<script>
  const socket = io();
  const connDot = document.getElementById('connDot');
  const connText = document.getElementById('connText');
  const scanline = document.getElementById('scanline');
  const sheetName = document.getElementById('sheetName');
  const rowCount = document.getElementById('rowCount');
  const colCount = document.getElementById('colCount');
  const updatedAt = document.getElementById('updatedAt');
  const ageAt = document.getElementById('ageAt');
  const clockAt = document.getElementById('clockAt');
  const tableContainer = document.getElementById('tableContainer');
  const tableWrap = document.querySelector('.table-wrap');
  const searchBox = document.getElementById('searchBox');

  let currentHeaders = [];
  let currentRows = [];
  let previousRows = null;      // last snapshot actually shown, for diffing
  let lastUpdateTime = null;

  // ---- live table DOM cache: only rebuilt when structure changes ----
  let tableBuilt = false;
  let builtHeaders = [];
  let builtNumericCols = [];
  let rowRefs = [];             // tr elements, index = row index
  let cellRefs = [];            // cellRefs[rIdx][cIdx] = td element (data cols only)
  let showingFiltered = false;

  socket.on('connect', () => {
    connDot.classList.add('live');
    connText.textContent = 'live';
  });

  socket.on('disconnect', () => {
    connDot.classList.remove('live');
    connText.textContent = 'disconnected';
  });

  socket.on('data_update', (data) => {
    if (!data || !data.headers || data.headers.length === 0) return;
    loadData(data);
    scanline.classList.remove('flash');
    void scanline.offsetWidth;
    scanline.classList.add('flash');
  });

  function loadData(data) {
    const headers = data.headers;
    const rows = data.rows;
    const numericCols = headers.map((_, i) => columnIsNumeric(i, rows));

    sheetName.textContent = data.sheet_name || 'Sheet';
    updatedAt.textContent = data.updated_at || '—';
    lastUpdateTime = Date.now();

    // sirf changed cells nikaalte hain — poora dataset compare nahi karte page pe
    const diffs = computeDiffs(headers, rows, numericCols);

    currentHeaders = headers;
    currentRows = rows;
    searchBox.disabled = false;

    if (!showingFiltered) {
      rowCount.innerHTML = `<span class="num">${rows.length}</span> rows`;
    }
    colCount.innerHTML = `<span class="num">${headers.length}</span> cols`;

    if (searchBox.value.trim()) {
      // search active hai to filtered view hi refresh hoga, live update ke saath
      showingFiltered = true;
      tableBuilt = false; // agla non-filtered render full rebuild karega
      applyFilter();
    } else {
      const headersChanged = JSON.stringify(headers) !== JSON.stringify(builtHeaders);
      const structureSame = tableBuilt && !headersChanged &&
        rows.length === rowRefs.length &&
        JSON.stringify(numericCols) === JSON.stringify(builtNumericCols);

      if (!structureSame) {
        buildTable(headers, rows, numericCols);
      } else {
        patchCells(diffs);
      }
      showingFiltered = false;
    }

    previousRows = rows;
  }

  function isNumericValue(v) {
    if (v === null || v === undefined || v === '') return false;
    const n = Number(String(v).replace(/,/g, ''));
    return !isNaN(n) && isFinite(n);
  }

  function columnIsNumeric(colIdx, rows) {
    let sawValue = false;
    for (const row of rows) {
      const v = row[colIdx];
      if (v === null || v === undefined || v === '') continue;
      sawValue = true;
      if (!isNumericValue(v)) return false;
    }
    return sawValue;
  }

  function formatNumber(v) {
    const n = Number(String(v).replace(/,/g, ''));
    if (Number.isInteger(n)) return n.toLocaleString('en-IN');
    return n.toLocaleString('en-IN', { maximumFractionDigits: 4 });
  }

  function cellText(v) { return v === null || v === undefined ? '' : String(v); }

  // Purane snapshot se naya snapshot compare karke sirf badle hue cells ki list banate hain
  function computeDiffs(headers, rows, numericCols) {
    if (!previousRows) return [];
    const diffs = [];
    rows.forEach((row, rIdx) => {
      const prevRow = previousRows[rIdx];
      if (!prevRow) return;
      row.forEach((cell, cIdx) => {
        const rawNew = cellText(cell);
        const rawOld = cellText(prevRow[cIdx]);
        if (rawNew === rawOld) return;
        const isNum = numericCols[cIdx];
        let up = null;
        if (isNum && isNumericValue(rawNew) && isNumericValue(rawOld)) {
          const a = Number(rawOld.replace(/,/g, ''));
          const b = Number(rawNew.replace(/,/g, ''));
          up = b > a;
        }
        diffs.push({ rIdx, cIdx, field: headers[cIdx], row: rIdx + 1, from: rawOld, to: rawNew, up, isNum });
      });
    });
    return diffs;
  }

  // Sirf jo cells badli hain unhi ka DOM patch karte hain — baaki page bilkul untouched rehta hai
  function patchCells(diffs) {
    diffs.forEach(d => {
      const td = cellRefs[d.rIdx] && cellRefs[d.rIdx][d.cIdx];
      if (!td) return;
      const isNumDisplay = d.isNum && isNumericValue(d.to) && d.to !== '';
      td.textContent = isNumDisplay ? formatNumber(d.to) : d.to;
      td.title = d.to;

      td.classList.remove('tick-up', 'tick-down', 'tick-changed', 'arrow-up', 'arrow-down');
      void td.offsetWidth; // restart animation on repeated ticks
      if (d.up === true) td.classList.add('tick-up', 'arrow-up');
      else if (d.up === false) td.classList.add('tick-down', 'arrow-down');
      else td.classList.add('tick-changed');
    });
  }

  // Poori table sirf tabhi dobara banti hai jab columns, headers ya row count badle hon
  function buildTable(headers, rows, numericCols) {
    const savedScrollTop = tableWrap.scrollTop;
    const savedScrollLeft = tableWrap.scrollLeft;

    if (rows.length === 0) {
      tableContainer.innerHTML = `
        <div class="empty-state">
          <div class="big">Sheet khali hai</div>
          <div class="small">Data daalo aur save karo</div>
        </div>`;
      tableBuilt = false;
      return;
    }

    let html = '<table><thead><tr><th class="idx-col">#</th>';
    headers.forEach((h, i) => {
      html += `<th class="${numericCols[i] ? 'col-num' : ''}" title="${escapeHtml(h)}">${escapeHtml(h)}</th>`;
    });
    html += '</tr></thead><tbody>';
    rows.forEach((row, rIdx) => {
      html += '<tr>';
      html += `<td class="idx-col">${rIdx + 1}</td>`;
      row.forEach((cell, cIdx) => {
        const raw = cellText(cell);
        const isNum = numericCols[cIdx] && isNumericValue(raw) && raw !== '';
        const display = isNum ? formatNumber(raw) : escapeHtml(raw);
        html += `<td class="${isNum ? 'col-num' : ''}" title="${escapeHtml(raw)}">${display}</td>`;
      });
      html += '</tr>';
    });
    html += '</tbody></table>';
    tableContainer.innerHTML = html;

    tableWrap.scrollTop = savedScrollTop;
    tableWrap.scrollLeft = savedScrollLeft;

    rowRefs = Array.from(tableContainer.querySelectorAll('tbody tr'));
    cellRefs = rowRefs.map(tr => Array.from(tr.children).slice(1)); // skip idx-col
    builtHeaders = headers.slice();
    builtNumericCols = numericCols.slice();
    tableBuilt = true;
  }

  function applyFilter() {
    const q = searchBox.value.trim().toLowerCase();
    showingFiltered = !!q;
    if (!q) {
      tableBuilt = false; // force clean rebuild of the live table on next update
      buildTable(currentHeaders, currentRows, currentHeaders.map((_, i) => columnIsNumeric(i, currentRows)));
      rowCount.innerHTML = `<span class="num">${currentRows.length}</span> rows`;
      return;
    }
    const filtered = currentRows.filter(row =>
      row.some(cell => String(cell ?? '').toLowerCase().includes(q))
    );
    rowCount.innerHTML = `<span class="num">${filtered.length}</span> / ${currentRows.length} rows`;
    if (filtered.length === 0) {
      tableContainer.innerHTML = `<div class="no-match">Koi match nahi mila for "${escapeHtml(searchBox.value)}"</div>`;
      return;
    }
    const numericCols = currentHeaders.map((_, i) => columnIsNumeric(i, currentRows));
    let html = '<table><thead><tr><th class="idx-col">#</th>';
    currentHeaders.forEach((h, i) => {
      html += `<th class="${numericCols[i] ? 'col-num' : ''}" title="${escapeHtml(h)}">${escapeHtml(h)}</th>`;
    });
    html += '</tr></thead><tbody>';
    filtered.forEach((row, rIdx) => {
      html += `<tr><td class="idx-col">${rIdx + 1}</td>`;
      row.forEach((cell, cIdx) => {
        const raw = cellText(cell);
        const isNum = numericCols[cIdx] && isNumericValue(raw) && raw !== '';
        const display = isNum ? formatNumber(raw) : escapeHtml(raw);
        html += `<td class="${isNum ? 'col-num' : ''}" title="${escapeHtml(raw)}">${display}</td>`;
      });
      html += '</tr>';
    });
    html += '</tbody></table>';
    tableContainer.innerHTML = html;
  }

  function escapeHtml(val) {
    const div = document.createElement('div');
    div.textContent = val === null || val === undefined ? '' : val;
    return div.innerHTML;
  }

  document.addEventListener('keydown', (e) => {
    if (e.key === '/' && document.activeElement !== searchBox) {
      e.preventDefault();
      searchBox.focus();
    }
    if (e.key === 'Escape' && document.activeElement === searchBox) {
      searchBox.value = '';
      applyFilter();
      searchBox.blur();
    }
  });

  setInterval(() => {
    clockAt.textContent = new Date().toLocaleTimeString('en-IN', { hour12: false });
    if (lastUpdateTime) {
      const secs = Math.floor((Date.now() - lastUpdateTime) / 1000);
      ageAt.textContent = secs < 1 ? 'now' : `${secs}s`;
    }
  }, 1000);

  fetch('/latest').then(r => r.json()).then(data => {
    if (data.headers && data.headers.length) {
      loadData(data);
    }
  });
</script>

</body>
</html>

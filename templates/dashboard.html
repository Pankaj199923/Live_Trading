<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Live Excel Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0B0E11;
    --panel: #12161B;
    --border: #232A32;
    --text: #E6E9EC;
    --muted: #7C8590;
    --live: #3DDC84;
    --live-dim: #1E5C3C;
    --amber: #F5A623;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', sans-serif;
    min-height: 100vh;
  }
  .topbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 18px 28px;
    border-bottom: 1px solid var(--border);
    background: var(--panel);
    flex-wrap: wrap;
    gap: 12px;
  }
  .brand {
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .brand-title {
    font-weight: 700;
    font-size: 15px;
    letter-spacing: 0.02em;
  }
  .brand-sub {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 12px;
    color: var(--muted);
  }
  .status {
    display: flex;
    align-items: center;
    gap: 22px;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 12px;
    color: var(--muted);
  }
  .status-item { display: flex; align-items: center; gap: 8px; }
  .dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--muted);
    position: relative;
  }
  .dot.live {
    background: var(--live);
    box-shadow: 0 0 0 0 rgba(61, 220, 132, 0.6);
    animation: pulse 2s infinite;
  }
  @keyframes pulse {
    0% { box-shadow: 0 0 0 0 rgba(61, 220, 132, 0.55); }
    70% { box-shadow: 0 0 0 8px rgba(61, 220, 132, 0); }
    100% { box-shadow: 0 0 0 0 rgba(61, 220, 132, 0); }
  }
  .scanline {
    height: 2px;
    width: 100%;
    background: linear-gradient(90deg, transparent, var(--live), transparent);
    opacity: 0;
  }
  .scanline.flash {
    animation: scan 0.9s ease-out;
  }
  @keyframes scan {
    0% { opacity: 1; transform: translateX(-100%); }
    60% { opacity: 1; }
    100% { opacity: 0; transform: translateX(100%); }
  }
  .container {
    padding: 24px 28px 48px;
    max-width: 1400px;
    margin: 0 auto;
  }
  .meta-row {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    margin-bottom: 16px;
    flex-wrap: wrap;
    gap: 10px;
  }
  .sheet-name {
    font-size: 22px;
    font-weight: 600;
  }
  .row-count {
    font-family: 'IBM Plex Mono', monospace;
    color: var(--muted);
    font-size: 13px;
  }
  .table-wrap {
    border: 1px solid var(--border);
    border-radius: 10px;
    overflow: hidden;
    background: var(--panel);
  }
  table {
    width: 100%;
    border-collapse: collapse;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 13px;
  }
  thead th {
    text-align: left;
    padding: 12px 16px;
    background: #171C22;
    color: var(--muted);
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.04em;
    font-size: 11px;
    border-bottom: 1px solid var(--border);
    position: sticky;
    top: 0;
  }
  tbody td {
    padding: 10px 16px;
    border-bottom: 1px solid var(--border);
    color: var(--text);
    white-space: nowrap;
  }
  tbody tr:last-child td { border-bottom: none; }
  tbody tr:hover { background: #171C22; }
  tbody tr.updated {
    animation: rowFlash 1.4s ease-out;
  }
  @keyframes rowFlash {
    0% { background: rgba(61, 220, 132, 0.18); }
    100% { background: transparent; }
  }
  .empty-state {
    padding: 60px 20px;
    text-align: center;
    color: var(--muted);
  }
  .empty-state .big {
    font-size: 15px;
    color: var(--text);
    margin-bottom: 6px;
  }
  .empty-state .small {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 12px;
  }
</style>
</head>
<body>

<div class="scanline" id="scanline"></div>

<div class="topbar">
  <div class="brand">
    <div class="brand-title">Live Excel Dashboard</div>
    <div class="brand-sub">/ real-time sync</div>
  </div>
  <div class="status">
    <div class="status-item"><span class="dot" id="connDot"></span><span id="connText">connecting…</span></div>
    <div class="status-item">last update: <span id="updatedAt" style="color:var(--text)">—</span></div>
  </div>
</div>

<div class="container">
  <div class="meta-row">
    <div class="sheet-name" id="sheetName">Waiting for data…</div>
    <div class="row-count" id="rowCount"></div>
  </div>

  <div class="table-wrap">
    <div id="tableContainer">
      <div class="empty-state">
        <div class="big">Abhi tak koi data nahi aaya</div>
        <div class="small">Apna excel_watcher.py chalu karo taaki live data yahan dikhe</div>
      </div>
    </div>
  </div>
</div>

<script src="/static/socket.io.min.js"></script>
<script>
  const socket = io();
  const connDot = document.getElementById('connDot');
  const connText = document.getElementById('connText');
  const scanline = document.getElementById('scanline');
  const sheetName = document.getElementById('sheetName');
  const rowCount = document.getElementById('rowCount');
  const updatedAt = document.getElementById('updatedAt');
  const tableContainer = document.getElementById('tableContainer');

  socket.on('connect', () => {
    connDot.classList.add('live');
    connText.textContent = 'live';
  });

  socket.on('disconnect', () => {
    connDot.classList.remove('live');
    connText.textContent = 'disconnected';
  });

  socket.on('data_update', (data) => {
    if (!data || !data.headers || data.headers.length === 0) return;

    sheetName.textContent = data.sheet_name || 'Sheet';
    rowCount.textContent = `${data.rows.length} rows`;
    updatedAt.textContent = data.updated_at || '—';

    renderTable(data.headers, data.rows);

    scanline.classList.remove('flash');
    void scanline.offsetWidth; // restart animation
    scanline.classList.add('flash');
  });

  function renderTable(headers, rows) {
    if (rows.length === 0) {
      tableContainer.innerHTML = `
        <div class="empty-state">
          <div class="big">Sheet khali hai</div>
          <div class="small">Data daalo aur save karo</div>
        </div>`;
      return;
    }

    let html = '<table><thead><tr>';
    headers.forEach(h => { html += `<th>${escapeHtml(h)}</th>`; });
    html += '</tr></thead><tbody>';
    rows.forEach(row => {
      html += '<tr class="updated">';
      row.forEach(cell => { html += `<td>${escapeHtml(cell)}</td>`; });
      html += '</tr>';
    });
    html += '</tbody></table>';
    tableContainer.innerHTML = html;
  }

  function escapeHtml(val) {
    const div = document.createElement('div');
    div.textContent = val === null || val === undefined ? '' : val;
    return div.innerHTML;
  }

  // Page load hote hi latest data fetch kar lo (agar socket connect hone se pehle miss ho jaaye)
  fetch('/latest').then(r => r.json()).then(data => {
    if (data.headers && data.headers.length) {
      sheetName.textContent = data.sheet_name || 'Sheet';
      rowCount.textContent = `${data.rows.length} rows`;
      updatedAt.textContent = data.updated_at || '—';
      renderTable(data.headers, data.rows);
    }
  });
</script>

</body>
</html>
